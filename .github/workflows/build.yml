name: Build Packages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build:
    runs-on: ${{ matrix.arch.runner }}
    strategy:
      fail-fast: false
      matrix:
        distro: [forky, trixie, bookworm, resolute, noble]
        package: [hostap_s1g, morse_cli, morse_driver-dkms, morse-firmware]
        arch:
          - runner: ubuntu-24.04
            name: amd64
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            name: arm64
            platform: linux/arm64
          - runner: ubuntu-24.04-arm
            name: armhf
            platform: linux/arm/v7
          - runner: ubuntu-24.04-arm
            name: riscv64
            platform: linux/riscv64
        exclude:
          # Architecture: all packages — identical output on all arches
          - package: morse-firmware
            arch:
              name: arm64
          - package: morse_driver-dkms
            arch:
              name: arm64
          - package: morse-firmware
            arch:
              name: armhf
          - package: morse_driver-dkms
            arch:
              name: armhf
          - package: morse-firmware
            arch:
              name: riscv64
          - package: morse_driver-dkms
            arch:
              name: riscv64
          # Bookworm doesn't support riscv64
          - distro: bookworm
            arch:
              name: riscv64

    name: ${{ matrix.package }} (${{ matrix.distro }}, ${{ matrix.arch.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Include distro in release version
        working-directory: ${{ matrix.package }}
        env:
          distro: ${{ matrix.distro }}
        # Rewrite the Debian changelog to append the '~distro' to the latest version (line 1).
        run: |
          sed -i -E "1s/\(([^)]+)\)/(\1~${distro})/" debian/changelog

      - name: Build Container
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/${{ matrix.distro }}/devcontainer.json
          platform: ${{ matrix.arch.platform }}
          push: never

      # Workaround devcontainer/ci runCmd platform issues
      - name: Load container
        run: |
          skopeo copy oci-archive:/tmp/output.tar docker-daemon:mm-devcontainer:${{ matrix.distro }}

      - name: Build Packages
        run: |
          docker run --rm \
            -v .:/workspace \
            -w /workspace \
            --platform ${{ matrix.arch.platform }} \
            mm-devcontainer:${{ matrix.distro }} \
            bash -c "
              set -e
              cd ${{ matrix.package }}

              # Fetch upstream source tarball
              if grep -q '^get-orig-source:' debian/rules; then
                make -f debian/rules get-orig-source
              fi
              origtargz --unpack=yes

              # Build unsigned packages
              dpkg-buildpackage -us -uc
            "

      - name: List files
        run: ls -l *.deb *.buildinfo *.changes

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package }}-${{ matrix.distro }}-${{ matrix.arch.name }}
          path: |
            *.deb
            *.buildinfo
            *.changes
