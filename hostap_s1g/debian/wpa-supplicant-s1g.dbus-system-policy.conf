<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

    <policy user="root">
        <allow own="fi.w1.wpa_supplicant1_s1g"/>
        <allow send_destination="fi.w1.wpa_supplicant1_s1g"/>
        <allow send_interface="fi.w1.wpa_supplicant1_s1g"/>
        <allow receive_sender="fi.w1.wpa_supplicant1_s1g" receive_type="signal"/>
    </policy>

    <policy context="default">
        <deny own="fi.w1.wpa_supplicant1_s1g"/>
        <deny send_destination="fi.w1.wpa_supplicant1_s1g"/>
        <allow send_destination="fi.w1.wpa_supplicant1_s1g"
               send_interface="org.freedesktop.DBus.Introspectable"/>
        <allow send_destination="fi.w1.wpa_supplicant1_s1g"
               send_interface="org.freedesktop.DBus.Properties"/>
        <allow receive_sender="fi.w1.wpa_supplicant1_s1g" receive_type="signal"/>
    </policy>

</busconfig>
